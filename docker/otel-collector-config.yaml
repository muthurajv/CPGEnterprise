receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 10s
    send_batch_size: 1000

exporters:
  # Grafana Cloud — Traces (Tempo)
  otlphttp/tempo:
    endpoint: ${env:GRAFANA_CLOUD_TRACES_URL}
    headers:
      Authorization: "Basic ${env:GRAFANA_CLOUD_AUTH}"
    tls:
      insecure: false

  # Grafana Cloud — Metrics (Mimir / Prometheus)
  prometheusremotewrite:
    endpoint: ${env:GRAFANA_CLOUD_METRICS_URL}
    headers:
      Authorization: "Basic ${env:GRAFANA_CLOUD_AUTH}"
    tls:
      insecure_skip_verify: false

  # Grafana Cloud — Logs (Loki)
  loki:
    endpoint: ${env:GRAFANA_CLOUD_LOGS_URL}
    headers:
      Authorization: "Basic ${env:GRAFANA_CLOUD_AUTH}"
    default_labels_enabled:
      exporter: false
      job: true

  # Debug exporter — prints to collector stdout in local dev
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 100

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, debug]

  telemetry:
    logs:
      level: info
