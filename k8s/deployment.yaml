apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpg-supply-chain
  namespace: cpg-observability
  labels:
    app: cpg-supply-chain
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpg-supply-chain
  template:
    metadata:
      labels:
        app: cpg-supply-chain
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: cpg-supply-chain
          image: cpgregistry.azurecr.io/cpg-supply-chain:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: cpg-supply-chain-config
            - secretRef:
                name: cpg-supply-chain-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets:
        - name: acr-secret
---
# OTel Collector DaemonSet sidecar for AKS
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: cpg-observability
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          envFrom:
            - secretRef:
                name: grafana-cloud-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
